services:
  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: mentra-app
    command: npm run dev
    ports:
      - "3000:3000"
    env_file:
      - ./app/.env
    volumes:
      - ./app:/app
      - /app/node_modules
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: mentra-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mentra
      POSTGRES_USER: mentra
      POSTGRES_PASSWORD: mentra
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
